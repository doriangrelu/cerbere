name: Publish Packages

on:
  push:
    branches: [master]

permissions:
  contents: read
  packages: write

jobs:
  publish-shared-kernel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Build and deploy cerbere-shared-kernel
        working-directory: cerbere-shared-kernel
        run: |
          chmod +x mvnw
          ./mvnw --batch-mode -s "$GITHUB_WORKSPACE/settings.xml" deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-services:
    needs: publish-shared-kernel
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module:
          - api-gateway
          - cerbere-bff
          - cerbere-core
          - cerbere-history
          - cerbere-notification
          - cerbere-devices-mock
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Build and deploy ${{ matrix.module }}
        working-directory: ${{ matrix.module }}
        run: |
          chmod +x mvnw
          ./mvnw --batch-mode -s "$GITHUB_WORKSPACE/settings.xml" deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
