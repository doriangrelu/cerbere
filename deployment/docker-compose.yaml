name: cerbere

services:
  mongodb:
    image: mongo:latest
    container_name: cerbere-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:latest
    container_name: cerbere-kafka
    ports:
      - "9094:9094"
    environment:
      # Mode KRaft (sans Zookeeper), noeud unique combinant broker + controller.
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # PLAINTEXT : accessible depuis les autres conteneurs du réseau compose (cerbere-kafka:9092).
      # PLAINTEXT_HOST : accessible depuis la machine hôte (localhost:9094), utile tant que les
      # microservices Java tournent encore via `mvnw spring-boot:run` hors conteneur.
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://cerbere-kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@cerbere-kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  cerbere-core:
    image: cerbere-core:latest
    pull_policy: never
    container_name: cerbere-core
    ports:
      - "8082:8082"
    environment:
      SPRING_MONGODB_HOST: cerbere-mongodb
      SPRING_KAFKA_BOOTSTRAPSERVERS: cerbere-kafka:9092
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy

  cerbere-history:
    image: cerbere-history:latest
    pull_policy: never
    container_name: cerbere-history
    ports:
      - "8084:8084"
    environment:
      SPRING_MONGODB_HOST: cerbere-mongodb
      SPRING_KAFKA_BOOTSTRAPSERVERS: cerbere-kafka:9092
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy

  cerbere-bff:
    image: cerbere-bff:latest
    pull_policy: never
    container_name: cerbere-bff
    ports:
      - "8083:8083"
    environment:
      CERBERE_CORE_BASEURL: http://cerbere-core:8082
      CERBERE_DEVICESMOCK_BASEURL: http://cerbere-devices-mock:8081
      CERBERE_HISTORY_BASEURL: http://cerbere-history:8084
    depends_on:
      - cerbere-core
      - cerbere-history

  cerbere-devices-mock:
    image: cerbere-devices-mock:latest
    pull_policy: never
    container_name: cerbere-devices-mock
    profiles: ["mock"]
    ports:
      - "8081:8081"
    environment:
      SPRING_MONGODB_HOST: cerbere-mongodb
      SPRING_KAFKA_BOOTSTRAPSERVERS: cerbere-kafka:9092
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: cerbere-mosquitto
    profiles: ["hardware"]
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data

  zigbee2mqtt:
    image: koenkk/zigbee2mqtt:latest
    container_name: cerbere-zigbee2mqtt
    profiles: ["hardware"]
    ports:
      - "8090:8080"
    volumes:
      - zigbee2mqtt_data:/app/data
    environment:
      ZIGBEE2MQTT_CONFIG_MQTT_SERVER: mqtt://cerbere-mosquitto:1883
      # Chemin du dongle coordinateur côté hôte : à adapter selon la machine
      # (voir docs/deployment/nuc-deployment.md — passthrough natif sous Debian,
      # non trivial sous Windows).
      ZIGBEE2MQTT_CONFIG_SERIAL_PORT: /dev/ttyUSB0
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    depends_on:
      - mosquitto

  cerbere-devices-bridge:
    image: cerbere-devices-bridge:latest
    pull_policy: never
    container_name: cerbere-devices-bridge
    profiles: ["hardware"]
    ports:
      - "8085:8085"
    environment:
      SPRING_MONGODB_HOST: cerbere-mongodb
      SPRING_KAFKA_BOOTSTRAPSERVERS: cerbere-kafka:9092
      CERBERE_DEVICESBRIDGE_MQTT_BROKERURL: tcp://cerbere-mosquitto:1883
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mosquitto:
        condition: service_started

volumes:
  mongodb_data:
  mosquitto_data:
  zigbee2mqtt_data:

# api-gateway et cerbere-notification restent des scaffolds vides (aucune valeur à
# containeriser un service qui ne fait rien) : pas présents dans ce compose.
# Images cerbere-* construites localement via Cloud Native Buildpacks
# (./mvnw spring-boot:build-image, voir docs/adr/0008-strategie-images-cloud-native-buildpacks.md
# et docs/deployment/nuc-deployment.md) — pull_policy: never pour ne jamais tenter de les
# récupérer depuis un registre distant.
# Profils : par défaut (aucun --profile) → mongodb/kafka/core/bff/history seuls.
# --profile mock → ajoute cerbere-devices-mock (démo/dev sans matériel).
# --profile hardware → ajoute cerbere-devices-bridge + mosquitto + zigbee2mqtt (matériel réel).
# mock et hardware ne doivent jamais tourner ensemble (deux sources concurrentes d'événements device).
