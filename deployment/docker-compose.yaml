name: cerbere

services:
  mongodb:
    image: mongo:latest
    container_name: cerbere-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:latest
    container_name: cerbere-kafka
    ports:
      - "9094:9094"
    environment:
      # Mode KRaft (sans Zookeeper), noeud unique combinant broker + controller.
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # PLAINTEXT : accessible depuis les autres conteneurs du réseau compose (cerbere-kafka:9092).
      # PLAINTEXT_HOST : accessible depuis la machine hôte (localhost:9094), utile tant que les
      # microservices Java tournent encore via `mvnw spring-boot:run` hors conteneur.
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://cerbere-kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@cerbere-kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

volumes:
  mongodb_data:

# Les 5 autres services applicatifs (api-gateway, cerbere-bff, cerbere-core,
# cerbere-history, cerbere-notification) ainsi que cerbere-devices-mock
# containerisé seront ajoutés à ce compose dans une itération ultérieure,
# construits via Cloud Native Buildpacks (voir docs/adr/0008-strategie-images-cloud-native-buildpacks.md).
