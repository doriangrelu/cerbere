spring.application.name=cerbere-devices-mock

spring.mongodb.host=localhost
spring.mongodb.port=27017
spring.mongodb.database=cerbere_devices_mock

spring.kafka.bootstrap-servers=localhost:9094
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=fr.cerbere.component.cerbere_devices_mock.infrastructure.messaging.kafka.producer.DeviceEventEnvelopeSerializer

cerbere.devices-mock.simulation.fixed-delay-ms=15000
cerbere.devices-mock.simulation.trigger-probability=0.3

server.port=8081
