<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/main :: layout(~{::title}, ~{::main})}">
<head>
	<title>Cerbère — Devices</title>
</head>
<body>
<main>
	<h4>Devices</h4>

	<div th:replace="~{fragments/device-table :: deviceTable}"></div>

	<div class="space"></div>

	<article>
		<h6>Enregistrer un device</h6>
		<form hx-post="/devices" hx-target="#device-table" hx-swap="outerHTML">
			<div class="field label border">
				<input type="text" name="id" required>
				<label>Id (UUID du device réel/simulé)</label>
			</div>
			<div class="field label border suffix">
				<select name="type" required>
					<option value="CONTACT">CONTACT</option>
					<option value="MOTION">MOTION</option>
					<option value="SIREN">SIREN</option>
				</select>
				<label>Type</label>
				<i>arrow_drop_down</i>
			</div>
			<div class="field label border">
				<input type="text" name="label" required>
				<label>Libellé</label>
			</div>
			<div class="field label border suffix">
				<select name="zoneId">
					<option value="">— Aucune zone —</option>
					<option th:each="zone : ${zones}" th:value="${zone.id()}" th:text="${zone.name()}"></option>
				</select>
				<label>Zone</label>
				<i>arrow_drop_down</i>
			</div>
			<button type="submit">
				<i>add</i>
				<span>Ajouter</span>
			</button>
		</form>
	</article>
</main>
</body>
</html>
