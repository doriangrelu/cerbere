<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="zoneTable" id="zone-table">
	<article class="error" th:if="${zoneError}" th:text="${zoneError}"></article>
	<table class="border">
		<thead>
		<tr>
			<th>Nom</th>
			<th>Devices</th>
			<th></th>
		</tr>
		</thead>
		<tbody>
		<tr th:each="zone : ${zones}">
			<td>
				<form class="row" th:hx-put="@{/zones/{id}(id=${zone.id()})}"
					  hx-target="#zone-table" hx-swap="outerHTML">
					<input type="text" name="name" th:value="${zone.name()}" required>
					<button class="small circle transparent" type="submit">
						<i>save</i>
					</button>
				</form>
			</td>
			<td th:text="${#lists.size(zone.deviceIds())}"></td>
			<td>
				<button class="small circle transparent"
						th:hx-delete="@{/zones/{id}(id=${zone.id()})}"
						hx-target="#zone-table" hx-swap="outerHTML"
						hx-confirm="Supprimer cette zone ?">
					<i>delete</i>
				</button>
			</td>
		</tr>
		<tr th:if="${#lists.isEmpty(zones)}">
			<td colspan="3">Aucune zone enregistrée.</td>
		</tr>
		</tbody>
	</table>
</div>
</body>
</html>
