<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="zoneTable" id="zone-table">
	<article class="error" th:if="${zoneError}" th:text="${zoneError}"></article>
	<table class="border striped">
		<thead>
		<tr>
			<th>Nom</th>
			<th>Devices</th>
			<th>Violation</th>
			<th></th>
		</tr>
		</thead>
		<tbody>
		<tr th:each="zone : ${zones}">
			<td>
				<form class="row" th:hx-put="@{/zones/{id}(id=${zone.id()})}"
					  hx-target="#zone-table" hx-swap="outerHTML">
					<div class="field label border small round">
						<input type="text" name="name" class="upper" th:value="${zone.name()}" maxlength="120" required>
						<label>Nom</label>
					</div>
					<button class="small circle transparent" type="submit">
						<i>save</i>
					</button>
				</form>
			</td>
			<td th:text="${zone.deviceCount()}"></td>
			<td>
				<span class="chip small" th:classappend="${zone.violation()} ? 'error' : 'surface-variant'"
					  th:text="${zone.violation()} ? 'Violation' : 'OK'"></span>
			</td>
			<td>
				<button class="small circle transparent"
						th:hx-delete="@{/zones/{id}(id=${zone.id()})}"
						hx-target="#zone-table" hx-swap="outerHTML"
						hx-confirm="Supprimer cette zone ?">
					<i>delete</i>
				</button>
			</td>
		</tr>
		<tr th:if="${#lists.isEmpty(zones)}">
			<td colspan="4">Aucune zone enregistrée.</td>
		</tr>
		</tbody>
	</table>
</div>
</body>
</html>
