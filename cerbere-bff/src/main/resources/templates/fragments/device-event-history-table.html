<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="table" id="device-event-history-table">
	<table class="border striped">
		<thead>
		<tr>
			<th>Date</th>
			<th>Device</th>
			<th>Zone</th>
			<th>Type</th>
			<th>Détail</th>
		</tr>
		</thead>
		<tbody>
		<tr th:each="row : ${deviceEventRows}">
			<td th:text="${row.occurredAt()}"></td>
			<td class="upper" th:text="${row.deviceLabel()}"></td>
			<td class="upper" th:text="${row.zoneName()}"></td>
			<td th:text="${row.eventType()}"></td>
			<td>
				<span th:each="entry : ${row.payload()}" class="chip small surface-variant"
					  th:text="${entry.key} + ': ' + ${entry.value}"></span>
			</td>
		</tr>
		<tr th:if="${#lists.isEmpty(deviceEventRows)}">
			<td colspan="5">Aucun événement.</td>
		</tr>
		</tbody>
	</table>
	<div class="row" style="justify-content: flex-end;">
		<button class="small circle transparent" th:if="${deviceEventsPage gt 0}"
				th:hx-get="@{/history/device-events(page=${deviceEventsPage - 1})}"
				hx-target="#device-event-history-table" hx-swap="outerHTML">
			<i>chevron_left</i>
		</button>
		<span th:text="${(deviceEventsPage + 1)} + ' / ' + ${(deviceEventsTotalPages == 0 ? 1 : deviceEventsTotalPages)}"></span>
		<button class="small circle transparent" th:if="${(deviceEventsPage + 1) lt deviceEventsTotalPages}"
				th:hx-get="@{/history/device-events(page=${deviceEventsPage + 1})}"
				hx-target="#device-event-history-table" hx-swap="outerHTML">
			<i>chevron_right</i>
		</button>
	</div>
</div>
</body>
</html>
