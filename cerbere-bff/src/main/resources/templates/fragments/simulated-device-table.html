<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="simulatedDeviceTable" id="simulated-device-table">
	<article class="error" th:if="${simulatedDeviceError}" th:text="${simulatedDeviceError}"></article>
	<table class="border striped">
		<thead>
		<tr>
			<th>Type</th>
			<th>Libellé</th>
			<th>Zone</th>
			<th>Auto</th>
			<th>État courant</th>
			<th>Déclencher</th>
		</tr>
		</thead>
		<tbody>
		<tr th:each="device : ${simulatedDevices}">
			<td th:text="${device.type()}"></td>
			<td class="upper" th:text="${device.label()}"></td>
			<td class="upper" th:text="${device.zoneName() != null} ? ${device.zoneName()} : '—'"></td>
			<td th:text="${device.autoSimulate()} ? 'Oui' : 'Non'"></td>
			<td th:text="${device.currentState()}"></td>
			<td>
				<form class="row" th:hx-post="@{/test-mode/devices/{id}/events(id=${device.id()})}"
					  hx-target="#simulated-device-table" hx-swap="outerHTML">
					<div class="field label border small round suffix" th:if="${device.type() == 'CONTACT'}">
						<select name="state">
							<option value="OPEN">OPEN</option>
							<option value="CLOSED">CLOSED</option>
						</select>
						<label>État</label>
						<i>arrow_drop_down</i>
					</div>
					<div class="field label border small round suffix" th:if="${device.type() == 'MOTION'}">
						<select name="state">
							<option value="DETECTED">DETECTED</option>
							<option value="CLEAR">CLEAR</option>
						</select>
						<label>État</label>
						<i>arrow_drop_down</i>
					</div>
					<div class="field label border small round suffix" th:if="${device.type() == 'SIREN'}">
						<select name="state">
							<option value="ACTIVE">ACTIVE</option>
							<option value="INACTIVE">INACTIVE</option>
						</select>
						<label>État</label>
						<i>arrow_drop_down</i>
					</div>
					<button class="small circle transparent" type="submit">
						<i>bolt</i>
					</button>
				</form>
			</td>
		</tr>
		<tr th:if="${#lists.isEmpty(simulatedDevices)}">
			<td colspan="6">Aucun device simulé.</td>
		</tr>
		</tbody>
	</table>
</div>
</body>
</html>
