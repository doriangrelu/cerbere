<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="deviceSection" id="device-section">
	<article class="error" th:if="${deviceError}" th:text="${deviceError}"></article>
	<table class="border striped">
		<thead>
		<tr>
			<th>Libellé</th>
			<th>Type</th>
			<th>Zone</th>
			<th>Statut</th>
			<th>Violation</th>
			<th></th>
		</tr>
		</thead>
		<tbody>
		<tr th:each="device : ${devices}">
			<td>
				<form class="row" th:hx-put="@{/devices/{id}(id=${device.id()})}"
					  hx-target="#device-section" hx-swap="outerHTML">
					<div class="field label border small round">
						<input type="text" name="label" class="upper" th:value="${device.label()}" maxlength="120" required>
						<label>Libellé</label>
					</div>
					<input type="hidden" name="zoneId" th:value="${device.zoneId()}">
					<input type="hidden" name="enabled" th:value="${device.enabled()}">
					<button class="small circle transparent" type="submit">
						<i>save</i>
					</button>
				</form>
			</td>
			<td th:text="${device.type()}"></td>
			<td class="upper" th:text="${device.zoneName() != null} ? ${device.zoneName()} : '—'"></td>
			<td>
				<span class="chip small" th:classappend="${device.enabled()} ? 'primary' : 'surface-variant'"
					  th:text="${device.enabled()} ? 'Actif' : 'Inactif'"></span>
			</td>
			<td>
				<span class="chip small" th:classappend="${device.violation()} ? 'error' : 'surface-variant'"
					  th:text="${device.violation()} ? 'Violation' : 'OK'"></span>
			</td>
			<td>
				<div class="row">
					<button class="small circle transparent"
							th:hx-put="@{/devices/{id}/toggle(id=${device.id()})}"
							th:hx-vals="|{&quot;label&quot;: &quot;${device.label()}&quot;, &quot;zoneId&quot;: &quot;${device.zoneId() != null ? device.zoneId() : ''}&quot;, &quot;enabled&quot;: ${device.enabled()}}|"
							hx-target="#device-section" hx-swap="outerHTML">
						<i th:text="${device.enabled()} ? 'toggle_on' : 'toggle_off'"></i>
					</button>
					<button class="small circle transparent"
							th:hx-delete="@{/devices/{id}(id=${device.id()})}"
							hx-target="#device-section" hx-swap="outerHTML"
							hx-confirm="Supprimer ce device ?">
						<i>delete</i>
					</button>
				</div>
			</td>
		</tr>
		<tr th:if="${#lists.isEmpty(devices)}">
			<td colspan="6">Aucun device enregistré.</td>
		</tr>
		</tbody>
	</table>

	<div class="space"></div>

	<article>
		<h6>Enregistrer un device</h6>
		<form hx-post="/devices" hx-target="#device-section" hx-swap="outerHTML">
			<div class="field label border suffix">
				<select name="type" required>
					<option value="CONTACT">CONTACT</option>
					<option value="MOTION">MOTION</option>
					<option value="SIREN">SIREN</option>
				</select>
				<label>Type</label>
				<i>arrow_drop_down</i>
			</div>

			<div class="space"></div>

			<div class="field label border">
				<input type="text" name="label" class="upper" maxlength="120" required>
				<label>Libellé</label>
			</div>

			<div class="space"></div>

			<div class="field label border suffix">
				<select name="zoneId">
					<option value="">— Aucune zone —</option>
					<option class="upper" th:each="zone : ${zones}" th:value="${zone.id()}" th:text="${zone.name()}"></option>
				</select>
				<label>Zone</label>
				<i>arrow_drop_down</i>
			</div>

			<div class="space"></div>

			<button type="submit">
				<i>add</i>
				<span>Ajouter</span>
			</button>
		</form>
	</article>
</div>
</body>
</html>
